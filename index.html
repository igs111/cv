<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igor Godziewski - Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Winieta -->
  <div class="vignette"></div>

  <header id="top">
    <h1>IGOR GODZIEWSKI - PORTFOLIO</h1>
    <div class="wave"></div>
  </header>

  <section id="media" class="media-section reveal">

    <h2 class="section-title">MONTAŻ TELEDYSKU MUZYCZNEGO</h2>
    <div class="yt-wrapper reveal">
      <iframe width="100%" height="480" src="https://www.youtube.com/embed/q3MrXBxsi5s"
        frameborder="0" allowfullscreen></iframe>
    </div>

    <h2 class="section-title reveal">MONTAŻ KRÓTKICH TREŚCI PROMOCYJNYCH</h2>
    <div class="shorts-row reveal">
      <iframe src="https://www.instagram.com/reel/DLozp8pI7sM/embed"
        width="400" height="480" frameborder="0" allowfullscreen></iframe>

      <iframe src="https://www.tiktok.com/embed/7519192193215581462"
        width="400" height="480" frameborder="0" allowfullscreen></iframe>
    </div>

  </section>

  <section id="profiles" class="accounts reveal">
    <h2>PROFILE PROWADZONE PRZEZE MNIE</h2>

    <div class="account-gallery">
      <img src="konto1.png" class="zoomable" alt="Konto 1">
      <img src="konto2.png" class="zoomable" alt="Konto 2">
    </div>
  </section>

  <!-- Overlay powiększenia -->
  <div id="overlay" class="overlay">
    <span id="closeBtn">&times;</span>
    <img id="overlayImg" src="" alt="">
  </div>

  <script src="script.js"></script>
</body>
</html>
