<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Igor Godziewski - Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="vignette"></div>

  <header>
    <h1>IGOR GODZIEWSKI - PORTFOLIO</h1>
    <svg class="wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
      <path fill="#ffffff" d="M0,224L1440,96L1440,320L0,320Z"></path>
    </svg>
  </header>

  <section class="media-section">
    <h2 class="section-title">MONTAŻ TELEDYSKU MUZYCZNEGO</h2>
    <div class="yt-wrapper">
      <iframe src="https://www.youtube.com/embed/q3MrXBxsi5s"
        title="YouTube video player" frameborder="0" allowfullscreen></iframe>
    </div>

    <h2 class="section-title">MONTAŻ KRÓTKICH TREŚCI PROMOCYJNYCH</h2>
    <div class="shorts-row">
      <iframe src="https://www.instagram.com/reel/DLozp8pI7sM/embed"
        frameborder="0" allowfullscreen></iframe>

      <iframe src="https://www.tiktok.com/embed/7519192193215581462"
        frameborder="0" allowfullscreen></iframe>
    </div>
  </section>

  <section class="accounts">
    <h2>PROFILE PROWADZONE PRZEZE MNIE</h2>
    <div class="account-gallery">
      <img src="konto1.png" class="zoomable" alt="Konto 1">
      <img src="konto2.png" class="zoomable" alt="Konto 2">
    </div>
  </section>

  <div id="overlay" class="overlay">
    <span id="closeBtn">&times;</span>
    <img id="overlayImg" src="" alt="">
  </div>

  <script src="script.js"></script>
</body>
</html>
